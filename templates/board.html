<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='chessboard/css/chessboard-1.0.0.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Chess Game</title>

</head>
<body>

<div class="container">
    <h1 class="app-title">Chess Trainer</h1>
    <div class="clock-panel">
        <div class="clock-card" data-color="black">
            <span class="clock-label">Noirs</span>
            <span id="black-clock" class="clock-value">10:00</span>
        </div>
        <div class="clock-card" data-color="white">
            <span class="clock-label">Blancs</span>
            <span id="white-clock" class="clock-value">10:00</span>
        </div>
    </div>
    <p id="game-status" class="game-status"></p>
    <div id="board" style="width: 400px"></div>
    <div id="promotion-modal" class="promotion-modal hidden">
    <div class="promotion-box">
        <img data-piece="q">
        <img data-piece="r">
        <img data-piece="b">
        <img data-piece="n">
    </div>
</div>
    <a href="/new-game?color=white" class="btn">Jouer Blanc</a>
    <a href="/new-game?color=black" class="btn">Jouer Noir</a>
</div>


<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="{{ url_for('static', filename='chessboard/js/chessboard-1.0.0.min.js') }}"></script>

<script>
    window.initialFen = "{{ fen }}"; // {{ fen }} ne peux pas se mettre dans un fichier .js
    var currentFen = '{{ fen }}';
    var playerColor = "{{ color }}";
    window.initialClock = {{ clock|tojson }};
</script>

<script src="{{ url_for('static', filename='chessboard/js/board.js') }}"></script>

</body>
</html>
